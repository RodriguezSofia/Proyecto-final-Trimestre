<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static/css/registro.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="wrapper">
        <h1>Registro</h1>
        
        <div class="input-box">
            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <i class="fas fa-user"></i>
        </div>
        
        <div class="input-box">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <i class="fas fa-envelope"></i>
        </div>
        
        <div class="input-box password-container">
            <input type="password" id="contrasena" placeholder="Contraseña" required>
            <i class="fas fa-lock"></i>
        </div>
        
        <div class="input-box password-container">
            <input type="password" id="confirmar-contrasena" placeholder="Confirmar contraseña" required>
            <i class="fas fa-lock"></i>
        </div>
        <p id="error-validacion" style="display:none; color:#e74c3c; font-size:0.95rem; margin:0 0 16px 0;">Las contraseñas no coinciden</p>
  
        <!-- Dirección -->
        <div class="input-box">
            <input type="text" id="direccion" placeholder="Dirección * (para envío o contacto)" required>
            <i class="fas fa-home"></i>
        </div>

        <!-- Teléfono -->
        <div class="input-box">
            <input type="text" id="telefono" placeholder="Teléfono * (para contactarte)" required>
            <i class="fas fa-phone"></i>
        </div>

        <!-- Ciudad (solo Palmira) -->
        <select id="ciudad" required>
            <option value="" disabled selected hidden>Selecciona tu ciudad *</option>
            <option value="76520">Palmira</option> <!-- Id_ciudad de Palmira en tu BD -->
        </select>
        
        <button class="btn" type="submit" onclick="registro()">Registrarse</button>
        
        <div class="register-link">
            <p>¿Ya tienes una cuenta? <a href="/login">Iniciar Sesion</a></p>
        </div>
    </div>

<script>
        const inputContrasena = document.getElementById('contrasena');
        const inputConfirmar = document.getElementById('confirmar-contrasena');
        const errorValidacion = document.getElementById('error-validacion');

        function actualizarErrorContrasenas() {
            const contrasena = inputContrasena.value.trim();
            const confirmar = inputConfirmar.value.trim();

            if (confirmar.length > 0 && contrasena !== confirmar) {
                errorValidacion.style.display = 'block';
            } else {
                errorValidacion.style.display = 'none';
            }
        }

        inputContrasena.addEventListener('input', actualizarErrorContrasenas);
        inputConfirmar.addEventListener('input', actualizarErrorContrasenas);

        function registro() {
            const nombre = document.getElementById('nombre').value.trim();
            const correo = document.getElementById('email').value.trim();
            const contrasena = inputContrasena.value.trim();
            const confirmarContrasena = inputConfirmar.value.trim();
            const direccion = document.getElementById('direccion').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const Id_ciudad = document.getElementById('ciudad').value.trim();

            // Configuración estética reutilizable
            const alertConfig = {
                customClass: {
                    popup: 'swal-heladeria-popup',
                    title: 'swal-heladeria-title',
                    htmlContainer: 'swal-heladeria-content',
                    confirmButton: 'swal-heladeria-confirm-btn',
                    icon: 'swal-heladeria-icon'
                },
                buttonsStyling: false // Obliga a usar nuestro CSS
            };

            // 1. Validar campos vacíos
            if (!nombre || !correo || !contrasena || !confirmarContrasena || !direccion || !telefono || !Id_ciudad) {
                Swal.fire({
                    ...alertConfig,
                    icon: 'warning',
                    title: 'Campos incompletos',
                    text: 'Por favor, rellena todos los campos obligatorios.'
                });
                return;
            }

            // 2. Validar contraseñas
            if (contrasena !== confirmarContrasena) {
                errorValidacion.style.display = 'block';
                Swal.fire({
                    ...alertConfig,
                    icon: 'error',
                    title: '¡Error!',
                    text: 'Las contraseñas no coinciden.'
                });
                return;
            }

            errorValidacion.style.display = 'none';

            const datos = {
                nombre_completo: nombre,
                correo: correo,
                contrasena: contrasena,
                confirmar_contrasena: confirmarContrasena,
                direccion: direccion,
                telefono: telefono,
                Id_ciudad: Id_ciudad
            };

            // 3. Indicador de carga estilizado
            Swal.fire({
                ...alertConfig,
                title: 'Preparando tu cuenta...',
                didOpen: () => { Swal.showLoading() },
                allowOutsideClick: false
            });

            fetch('/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    Swal.fire({
                        ...alertConfig,
                        icon: 'error',
                        title: 'No se pudo registrar',
                        text: data.error
                    });
                } else {
                    Swal.fire({
                        ...alertConfig,
                        icon: 'success',
                        title: '¡Bienvenido!',
                        text: 'Usuario registrado exitosamente'
                    }).then(() => {
                        window.location.href = '/login';
                    });
                }
            })
            .catch(err => {
                console.error(err);
                Swal.fire({
                    ...alertConfig,
                    icon: 'error',
                    title: 'Error de conexión',
                    text: 'Hubo un problema al contactar con el servidor.'
                });
            });
        }
    </script>
</body>
</html>
