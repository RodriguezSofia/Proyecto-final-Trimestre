<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Nequi</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;800&display=swap" rel="stylesheet">
    <style>
        /* ESTO REEMPLAZA AL ARCHIVO CSS EXTERNO */
        :root { --magenta: #ff007a; --dark: #0f0f1e; --card: #1c1c30; }
        body { background-color: var(--dark); font-family: 'Manrope', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card-nequi { background: var(--card); width: 90%; max-width: 380px; padding: 35px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; color: white; border: 1px solid rgba(255, 255, 255, 0.05); }
        .logo-container img { height: 40px; margin-bottom: 20px; }
        .input-wrapper { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 12px; display: flex; margin-bottom: 20px; }
        .prefix { color: var(--magenta); font-weight: bold; margin-right: 10px; }
        input { background: transparent; border: none; color: white; font-size: 1.1rem; width: 100%; outline: none; }
        .btn-pay { background: linear-gradient(45deg, var(--magenta), #700e57); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card-nequi">
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Nequi_Logo.svg/512px-Nequi_Logo.svg.png">
        </div>
        <h1>Pagar con Nequi</h1>
        <form id="payForm">
            <div class="input-wrapper">
                <span class="prefix">+57</span>
                <input type="tel" id="u-phone" placeholder="3XX XXX XXXX" maxlength="10" required>
            </div>
            <button type="submit" class="btn-pay">SOLICITAR PAGO</button>
        </form>
    </div>

    <script>
        document.getElementById('payForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Notificación enviada al número: " + document.getElementById('u-phone').value);
        });
    </script>
</body>
</html>
