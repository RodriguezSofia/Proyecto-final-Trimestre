<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Paso 3: Nueva Contraseña</title>
    <link rel="stylesheet" href="../static/css/nueva_contra.css">
</head>
<body>
    <div class="card">
        <div class="icon">🔒</div>
        <h1>Crea tu nueva clave</h1>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form action="{{ url_for('nueva_contra') }}" method="POST">
            <div class="field">
                <label>Nueva Contraseña</label>
                <input type="password" name="nueva" placeholder="••••••••" required>
            </div>
            <div class="field">
                <label>Confirmar Contraseña</label>
                <input type="password" name="confirmar" placeholder="••••••••" required>
            </div>
            <button type="submit">Actualizar y Entrar</button>
        </form>
    </div>
</body>
</html>
