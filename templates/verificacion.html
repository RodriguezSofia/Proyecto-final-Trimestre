<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Paso 2: Verificar Código</title>
    <link rel="stylesheet" href="../static/css/verificacion.css">
</head>
<body>
    <div class="card">
        <div class="icon">🔢</div>
        <h1>Verifica tu identidad</h1>
        <p>Introduce el código de 4 dígitos enviado a tu correo.</p>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form action="{{ url_for('verificar_codigo') }}" method="POST">
            <div class="code-inputs">
                <input type="text" name="digit1" maxlength="1" required>
                <input type="text" name="digit2" maxlength="1" required>
                <input type="text" name="digit3" maxlength="1" required>
                <input type="text" name="digit4" maxlength="1" required>
            </div>
            <button type="submit">Verificar Ahora</button>
        </form>
    </div>
</body>
</html>
