<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Paso 2: Verificar Código</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/verificacion.css') }}">
</head>
<body>
    <div class="card">
        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="currentColor" class="icono-principal" viewBox="0 0 16 16">
  <path d="M10.067.87a2.89 2.89 0 0 0-4.134 0l-.622.638-.89-.011a2.89 2.89 0 0 0-2.924 2.924l.01.89-.636.622a2.89 2.89 0 0 0 0 4.134l.637.622-.011.89a2.89 2.89 0 0 0 2.924 2.924l.89-.01.622.636a2.89 2.89 0 0 0 4.134 0l.622-.637.89.011a2.89 2.89 0 0 0 2.924-2.924l-.01-.89.636-.622a2.89 2.89 0 0 0 0-4.134l-.637-.622.011-.89a2.89 2.89 0 0 0-2.924-2.924l-.89.01zm.287 5.984-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7 8.793l2.646-2.647a.5.5 0 0 1 .708.708"/>
</svg>
        <h1>Verifica tu identidad</h1>
        <p>Introduce el código de 4 dígitos enviado a tu correo.</p>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form action="{{ url_for('verificar_codigo') }}" method="POST">
            <div class="code-inputs">
                <input type="text" name="digit1" maxlength="1" required autofocus inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code">
                <input type="text" name="digit2" maxlength="1" required inputmode="numeric" pattern="[0-9]*">
                <input type="text" name="digit3" maxlength="1" required inputmode="numeric" pattern="[0-9]*">
                <input type="text" name="digit4" maxlength="1" required inputmode="numeric" pattern="[0-9]*">
            </div>
            <button type="submit">Verificar Ahora</button>
        </form>
    </div>
    <script>
        (function () {
            const inputs = Array.from(document.querySelectorAll(".code-inputs input"));
            if (inputs.length === 0) return;

            const focusNext = (index) => {
                if (index < inputs.length - 1) {
                    inputs[index + 1].focus();
                    inputs[index + 1].select();
                }
            };

            const focusPrev = (index) => {
                if (index > 0) {
                    inputs[index - 1].focus();
                    inputs[index - 1].select();
                }
            };

            inputs.forEach((input, index) => {
                input.addEventListener("input", (e) => {
                    const value = e.target.value.replace(/\D/g, "");
                    e.target.value = value.slice(-1);
                    if (e.target.value) focusNext(index);
                });

                input.addEventListener("keydown", (e) => {
                    if (e.key === "Backspace" && !e.target.value) {
                        e.preventDefault();
                        focusPrev(index);
                    }
                    if (e.key === "ArrowLeft") {
                        e.preventDefault();
                        focusPrev(index);
                    }
                    if (e.key === "ArrowRight") {
                        e.preventDefault();
                        focusNext(index);
                    }
                });

                input.addEventListener("paste", (e) => {
                    const paste = (e.clipboardData || window.clipboardData)
                        .getData("text")
                        .replace(/\D/g, "")
                        .slice(0, inputs.length);
                    if (!paste) return;
                    e.preventDefault();
                    paste.split("").forEach((char, i) => {
                        if (inputs[i]) inputs[i].value = char;
                    });
                    const lastIndex = Math.min(paste.length, inputs.length) - 1;
                    inputs[lastIndex].focus();
                });
            });
        })();
    </script>
</body>
</html>
