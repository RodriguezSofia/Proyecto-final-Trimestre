<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Pedido | Heladería Annia</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/confirmar_pedido.css') }}">
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 confirm-container">
            <h2 class="text-center">Confirmar Pedido</h2>

            <form id="formPedido" method="POST" action="{{ url_for('confirmar_pedido') }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="nombre_destinatario">¿Quién recibe?</label>
                        <input type="text" id="nombre_destinatario" name="nombre_destinatario" class="form-control" placeholder="Ej: Ana García" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="metodo_pago">Método de pago</label>
                        <select id="metodo_pago" name="metodo_pago" class="form-select" required>
                            {% for metodo in metodos_pago %}
                                <option value="{{ metodo.Id_metodo }}">{{ metodo.Nombre_pago }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="direccion">Dirección de envío</label>
                    <input type="text" id="direccion" name="direccion" class="form-control" placeholder="Calle, Barrio, Apto..." required>
                </div>

                <h4>Resumen de tu pedido</h4>
                <div id="carritoContainer" class="mb-4 border shadow-sm">
                    <p class="text-center text-muted">Cargando tu carrito...</p>
                </div>

                <button type="submit" class="btn btn-confirmar">
                    <i class="bi bi-check-circle-fill me-2"></i>Confirmar Compra
                </button>
            </form>
        </div>
    </div>
</div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
const carritoContainer = document.getElementById("carritoContainer");

function renderCarritoConfirm() {
    if (carrito.length === 0) {
        carritoContainer.innerHTML = "<p class='text-center'>Tu carrito está vacío.</p>";
        return;
    }

    carritoContainer.innerHTML = "";
    let total = 0;

    carrito.forEach((item, index) => {
        total += Number(item.precio);
        let div = document.createElement("div");
        div.classList.add("item-carrito");

        let precioFormateado = parseInt(item.precio).toLocaleString('es-CO');
        let saboresHTML = item.sabores.map(s => `<span class="badge bg-info text-dark me-1">${s.nombre}</span>`).join("");
        let toppingsHTML = item.toppings && item.toppings.length > 0 
            ? item.toppings.map(t => `<small class="text-muted"><br>+ Topping: ${t.nombre}</small>`).join("") 
            : "";

        div.innerHTML = `
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <span class="fw-bold" style="color:#147D7D;">${item.nombre}</span><br>
                    ${saboresHTML}
                    ${toppingsHTML}
                </div>
                <span class="fw-bold text-end">$${precioFormateado}</span>
            </div>
            <input type="hidden" name="carrito[${index}][id_producto]" value="${item.id_producto}">
            <input type="hidden" name="carrito[${index}][precio]" value="${item.precio}">
        `;

        item.sabores.forEach(sabor => {
            div.innerHTML += `<input type="hidden" name="carrito[${index}][sabores]" value="${sabor.id}">`;
        });

        if (item.toppings) {
            item.toppings.forEach((topping, i) => {
                div.innerHTML += `<input type="hidden" name="carrito[${index}][toppings][${i}]" value="${topping.id}">`;
            });
        }

        carritoContainer.appendChild(div);
    });

    const totalDiv = document.createElement("div");
    totalDiv.classList.add("mt-3", "pt-2", "text-end");
    totalDiv.innerHTML = `<span style="font-size: 1.2rem; color: #F54388;">Total a pagar: <strong>$${total.toLocaleString('es-CO')}</strong></span>`;
    carritoContainer.appendChild(totalDiv);
}

renderCarritoConfirm();

document.getElementById("formPedido").addEventListener("submit", () => {
    localStorage.removeItem("carrito");
});
</script>

</body>
</html>
