<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Heladería Annia</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/inicio.css') }}">
    <link rel="icon" href="/static/img/logo_01.png?v=2">
</head> 

<body>
    <div class="wrapper">
        <h1>Iniciar Sesión</h1>
        
        <div class="input-box">
            <input type="text" id="usuario" placeholder="Correo" required>
            <i class="bi bi-envelope-at-fill"></i>
        </div>
        
        <div class="input-box">
            <input type="password" id="contrasena" placeholder="Contraseña" required>
            <i class="bi bi-lock-fill"></i>
        </div>
        
        <div class="remember-forgot">
            <label>
                <input type="checkbox"> Recordarme
            </label>
            <a href="/recuperacion">¿Olvidaste tu contraseña?</a>
        </div>
        
        <button class="btn" onclick="login()">Ingresar</button>
        
        <div class="register-link">
            <p>¿No tienes una cuenta? <a href="/registro">Regístrate</a></p>
        </div>
    </div>

    <div class="modal fade" id="modalError" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content text-center" style="border-radius: 25px; border: 3px solid #dc3545; padding: 20px; background-color: white;">
                <div class="modal-body">
                    <i class="bi bi-exclamation-circle-fill" style="font-size: 3.5rem; color: #dc3545;"></i>
                    <h4 class="mt-3" style="color: #147D7D; font-weight: bold;">¡Ups!</h4>
                    <p id="mensajeError" class="mb-0 text-muted" style="color: #666;">Datos incorrectos.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalExito" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content text-center" style="border-radius: 25px; border: 3px solid #F54388; padding: 20px; background-color: white;">
                <div class="modal-body">
                    <i class="bi bi-check-circle-fill" style="font-size: 3.5rem; color: #147D7D;"></i>
                    <h4 class="mt-3" style="color: #F54388; font-weight: bold;">¡Bienvenido!</h4>
                    <p class="mb-0 text-muted" style="color: #666;">Iniciando sesión...</p>
                </div>
            </div>
        </div>
    </div>

    <script> 
        function login() {
            const datos = {
                correo: document.getElementById('usuario').value,
                password: document.getElementById('contrasena').value
            };

            fetch('/login', {
                method: 'POST',
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(datos)
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('mensajeError').innerText = data.error;
                    const modError = new bootstrap.Modal(document.getElementById('modalError'));
                    modError.show();
                    setTimeout(() => modError.hide(), 2000);
                    return;
                }

                if (data.redirect) {
                    const modExito = new bootstrap.Modal(document.getElementById('modalExito'));
                    modExito.show();
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1500);
                }
            })
            .catch(err => {
                console.error("Error:", err);
            });
        }
    </script>
</body>
</html>
