{% extends 'base.html' %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/contactos.css') }}">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link rel="icon" href="/static/img/logo_01.png?v=2">
{% endblock %}

{% block content %}
    <script>
        const usuarioLogueado = "{{ 'true' if session.get('usuario_nombre') else 'false' }}" === "true";
    </script>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById('formContacto');
        const mensajeDiv = document.getElementById('mensajeDiv');

        if (form) {
            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                const recaptchaResponse = grecaptcha.getResponse();
                if (!recaptchaResponse) {
                    mensajeDiv.className = 'message error';
                    mensajeDiv.textContent = 'Por favor, verifica que no eres un robot.';
                    mensajeDiv.style.display = 'block';
                    return;
                }

                const formData = {
                    correo: document.getElementById('correo').value,
                    mensaje: document.getElementById('mensaje').value,
                    'g-recaptcha-response': recaptchaResponse
                };

                try {
                    const response = await fetch('/contacto', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });

                    const result = await response.json();

                    if (response.ok) {
                        mensajeDiv.className = 'message success';
                        mensajeDiv.textContent = result.mensaje;
                        mensajeDiv.style.display = 'block';
                        form.reset();
                        grecaptcha.reset(); 
                    } else {
                        mensajeDiv.className = 'message error';
                        mensajeDiv.textContent = result.error;
                        mensajeDiv.style.display = 'block';
                    }

                    setTimeout(() => mensajeDiv.style.display = 'none', 5000);

                } catch (error) {
                    console.error('Error:', error);
                    mensajeDiv.className = 'message error';
                    mensajeDiv.textContent = 'Error de conexión con el servidor.';
                    mensajeDiv.style.display = 'block';
                }
            });
        }
    });
    </script>

    <main class="container mt-4">
        <section id="contacto">
            <h2>Contáctanos</h2>

            <div id="mensajeDiv" class="message" style="display:none;"></div>

            <form id="formContacto">
                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" name="correo" required>

                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="4" required></textarea>

                <div class="g-recaptcha my-3" data-sitekey="6LdYyb4sAAAAAFsUjWQNXx8b8kX3JuN0mrcCpoCD"></div>

                <button type="submit">Enviar</button>
            </form>

            <div class="info-contacto mt-4">
                <p><i class="bi bi-geo-alt"></i> Calle 10 #5-23, Palmira, Valle del Cauca</p>
                <p><i class="bi bi-telephone"></i> 310 555 1234</p>
                <p><i class="bi bi-envelope"></i> Annia@gmail.com</p>
            </div>
        </section>
    </main>
{% endblock %}

{% block scripts %}
    {% endblock %}
